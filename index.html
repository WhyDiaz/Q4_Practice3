<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice 3</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <h2>JavaScript For Loop</h2>

<p id="sample1"></p>

<script>
let Sample1= "";

for (let x = 0; x < 3; x++) {
  Sample1 += "The number is " + x + "<br>";
}

document.getElementById("sample1").innerHTML = Sample1;
</script>


<h2>JavaScript Do While Loop</h2>

<p id="sample2"></p>

<script>
let Sample2= "";
let y = 0;
while (y < 5) {
  Sample2 += "<br>The number is " + y;
  y++;
}
document.getElementById("sample2").innerHTML = Sample2;
</script>


<h2>JavaScript While Loop</h2>

<p id="sample"></p>

<script>
let Sample = "";
let x = 0;

do {
  Sample += "<br>The number is " + x;
  x++;
}
while (x < 5);  

document.getElementById("sample").innerHTML = Sample;
</script>



<h2>JavaScript While Loop</h2>

<p id="sample3"></p>

<script>
let Sample3 = "";
let z = 5;

do {
  Sample3 += "<br>The number is " + z;
  z--;
}
while (z < 0);  

document.getElementById("sample3").innerHTML = Sample3;
</script>


</body>
</html>
